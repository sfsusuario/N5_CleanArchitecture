server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: any path that isn't a real file falls back to index.html so React Router
    # (or a browser refresh on a deep link) doesn't 404 against nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets are content-hashed by Vite, safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
