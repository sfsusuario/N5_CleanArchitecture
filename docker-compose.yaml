services:
  zookeeper:
    image: wurstmeister/zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
  kafka:
    image: wurstmeister/kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    links:
     - zookeeper
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ADVERTISED_PORT: "9092"
      KAFKA_CREATE_TOPICS: "mytopic:1:1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      #HOSTNAME_COMMAND: "route -n | awk '/UG[ \t]/{print $$2}'"
      #HOSTNAME_COMMAND: curl http://169.254.169.254/latest/meta-data/public-hostname
      HOSTNAME_COMMAND: "echo 127.0.0.1"
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://_{HOSTNAME_COMMAND}:9094
      KAFKA_LISTENERS: INSIDE://:9092,OUTSIDE://:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: OUTSIDE
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    hostname: kafka-ui
    ports:
      - "8080:8080"
    links:
     - kafka
     - zookeeper
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
  postgres:
    # Replaces SQL Server: sqlpal (SQL Server's Windows-API-emulation layer for Linux, shared by
    # every mssql/server and azure-sql-edge image) reliably crashed on startup on some hosts —
    # see DOCUMENTATION.md "Troubleshooting" for the full investigation. Postgres is a native
    # Linux binary with no such compatibility layer, and starts in ~2-3s instead.
    image: postgres:16-alpine
    hostname: postgres
    container_name: postgres
    ports:
      # Host port 5433 (not 5432): many dev machines already run a native PostgreSQL service on
      # 5432 (as this one did) — mapping to the same host port would collide with it. The 5433
      # only affects host-side access; producer talks to this container over 5432 internally.
      - "5433:5432"
    environment:
      POSTGRES_DB: SecurityDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: PasswordO1.
    volumes:
      - ~/docker/postgres-data:/var/lib/postgresql/data
  elasticsearch:
    # Pinned to a later 7.17.x patch (not 7.17.5) because that tag's bundled JDK crashes on
    # startup under cgroups v2 (common on Docker Desktop + WSL2): "NullPointerException:
    # Cannot invoke CgroupInfo.getMountPoint() because anyController is null" in
    # JvmOptionsParser. Same major.minor as NEST/Elasticsearch.Net 7.17.5, so the REST API
    # the client talks to is unchanged — only the container's internal JDK differs.
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.28
    hostname: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
  producer:
    build:
      context: ./Services/Security
      dockerfile: Dockerfile
    image: security_dotnet:latest
    ports:
      - "5080:80"
    links:
     - kafka
     - postgres
     - elasticsearch
    environment:
      ASPNETCORE_ENVIRONMENT: docker
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=SecurityDb;Username=postgres;Password=PasswordO1."
      ProjectConfiguration__KafkaConnection: "kafka:9092"
      ProjectConfiguration__KafkaTopic: "mytopic"
      ProjectConfiguration__ElasticSearchConnection: "http://elasticsearch:9200"
  frontend:
    build:
      context: ./Services/Security/Security.Frontend
      dockerfile: Dockerfile
      args:
        # Runs in the browser on the host, not inside the Docker network, so it must use the
        # host-mapped port of `producer` (localhost:5080 — see comment in setup.ps1/DOCUMENTATION.md
        # on why not 5000: it collides with a Windows/Hyper-V reserved port range on some machines).
        VITE_API_BASE_URL: "http://localhost:5080"
    image: security_frontend:latest
    ports:
      - "3000:80"
    links:
     - producer
